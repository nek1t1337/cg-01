<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Login">
    <title>Login</title>
    <link href="https://fonts.googleapis.com/css?family=Inter&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="styles.css">
</head>


<body style="display: flex; min-height: 100vh;flex-direction: column;">
<div class="header" style="background: #D9D9D9; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100px; width: 100%;">

    <p class="text-15" style="margin: 0">
        <span class="text-black">Ev1lHack - лучшие среди рынка читов</span>
    </p>

</div>
<div class="body"
     style="border-top: 1px solid #ccc;; display: flex; flex:1; flex-direction: column; align-items: center; justify-content: center; padding-top: 15%; width: 100%;">
    <div style="display: flex; justify-content: center;  flex-direction: column; align-items: center; gap: 30px">
        <label>

            <input type="text" id="username" placeholder="логин">
        </label>

        <label>
            <input type="password" id="password" placeholder="P@assw0rd123">
        </label>
    </div>

    <button onclick="login()" style="cursor: pointer;">
        <span class="text-white text-6">Explore the system</span>
    </button>


    <br>
</div>
<footer style="display: flex; flex-direction: row;background: #D9D9D9; margin-top: 50px; padding: 20px; text-align: center; border-top: 1px solid #ccc;">
    <div style="display: flex; flex-direction: column; width: 200px">
        <p class="text-9"><span class="text-black">Evil Corporation INC</span></p>
        <p class="text-10"><span class="text-black">about us</span></p>
        <p class="text-11"><span class="text-black">what do we do</span></p>
        <div class="rectangle-5-12"></div>

    </div>
    <p class="text-13"><span class="text-black">«С программным обеспечением есть только две возможности: либо пользователи контролируют программу, либо программа контролирует пользователей».</span>
    </p>
    <img src="https://imgs.search.brave.com/4zxVamYqfcBsaThy3KHi1CFMXaqS_DJfgAtD_JDlVyQ/rs:fit:860:0:0:0/g:ce/aHR0cHM6Ly9haWZy/ZWVpbWFnZXMuY29t/L3dwLWNvbnRlbnQv/dXBsb2Fkcy8yMDI1/LzA0L3JpY2hhcmQt/c3RhbGxtYW4tMTAy/NHg2ODMucG5n" alt="stallman" style="width: 200px; height: 100px">

</footer>

</body>

<script>
    async function login() {
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;

        try {
            const res = await fetch('/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            const data = await res.json();

            if (res.ok) {

                window.location.href = '/';
            } else {
                alert('Ошибка: ' + data.message);
            }
        } catch (err) {
            alert('Сервер недоступен');
        }
    }
</script>
</html>
