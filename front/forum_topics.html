<script>


    async function loadThreads() {
        try {
            const params = new URLSearchParams(window.location.search);
            const category = params.get('category');
            const newThreadBtn = document.getElementById('new-thread-btn');
            if (newThreadBtn && category) {
                newThreadBtn.href = `/new-thread?category=${encodeURIComponent(category)}`;
            }

            let url = 'http://localhost:8080/threads';
            if (category) {
                url += `?category=${decodeURIComponent( category)}`;
            }
            const response = await fetch(url);
            const threads = await response.json();

            const container = document.querySelector('main > div');
            container.innerHTML = '';

            threads.forEach(t => {
                const card = document.createElement('a');
                card.href = `/thread?id=${t.id}`;
                card.style.cssText = "display: block; text-decoration: none; color: black; background: #D9D9D9; padding: 20px; margin-bottom: 10px; border-radius: 10px;";

                card.innerHTML = `
        <div style="font-weight: bold;">${t.topic}</div>
        <div style="font-size: 13px;">${t.content.substring(0, 50)}...</div>
    `;

                container.appendChild(card);
            });
        } catch (err) {
            console.error("Ошибка загрузки:", err);
        }
    }


    window.onload = loadThreads;
</script>
