<script>
    async function loadThread() {

        const params = new URLSearchParams(window.location.search);
        const threadId = params.get('id') || 1;

        const res = await fetch(`/threads/${threadId}`);

        const thread =await res.json();

        if (thread) {
            const container = document.querySelector('section');
            container.innerHTML = `
                <div style="background: #D9D9D9; color: black; padding: 20px; border-radius: 10px;">
                    <div style="font-weight: bold; border-bottom: 1px solid #ccc; padding-bottom: 10px;">
                        ${thread.topic}
                    </div>
                    <div style="margin-top: 15px;">
                        <strong>${thread.owner}</strong>: ${thread.content}
                    </div>
                </div>
            `;
        }
    }

    async function loadRecentUsers() {
        try {
            const response = await fetch('/recent-users');
            const users = await response.json();
            const listContainer = document.getElementById('recent-users-list');
            listContainer.innerHTML = '';

            users.forEach(u => {
                const div = document.createElement('div');
                div.style.color = '#4CAF50';
                div.innerText = u.username;
                listContainer.appendChild(div);
            });
        } catch (err) {
            console.error("Ошибка загрузки юзеров:", err);
        }
    }
    window.onload = () => {
        loadRecentUsers()
        loadThread();
    }

</script>
