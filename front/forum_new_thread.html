<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>New Thread - Evil Corporation</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body style="margin: 0; background-color: #222; color: white; font-family: sans-serif; min-height: 100vh; display: flex; flex-direction: column;">

<header style="padding: 20px 40px; display: flex; justify-content: space-between; align-items: center;">
    <h1 style="margin: 0; font-size: 24px;">Evil Corporation</h1>
    <nav style="display: flex; gap: 20px; font-size: 14px; opacity: 0.8;">
<!--        <span>profile</span><span>settings</span><span>support</span>-->
    </nav>
</header>

<main style="display: flex; gap: 30px; padding: 40px; flex: 1;">

    <section style="flex: 3; background-color: #4A4E52; border-radius: 20px; padding: 25px; display: flex; flex-direction: column; gap: 15px;">

        
        <input type="text" id="topic-input" placeholder="Topic name" style="padding: 12px; border-radius: 5px; border: none; font-size: 16px;">
        <textarea id="content-input" placeholder="Text here" style="flex: 1; padding: 12px; border-radius: 5px; border: none; resize: none;"></textarea>

        
        <button onclick="publishThread()" style="padding: 10px 30px; background-color: #4CAF50; color: white; border: none; border-radius: 5px; align-self: flex-start; cursor: pointer; font-weight: bold;">
            Publish
        </button>
    </section>

    <aside style="flex: 1; background-color: #6D6464; border-radius: 20px; padding: 25px; display: flex; flex-direction: column; gap: 10px;" id="recent-users-list">
        <h2 style="font-size: 18px; margin: 0 0 10px 0;">Recent users</h2>

    </aside>

</main>


<footer class="footer">
    <div class="footer-grid">
        <p class="text-9"><span class="text-black">Evil Corporation INC</span></p>
        <p class="text-10"><span class="text-black">about us</span></p>
        <p class="text-11"><span class="text-black">what do we do</span></p>
        <div class="rectangle-5-12"></div>

    </div>
    <p class="text-13"><span class="text-black">«С программным обеспечением есть только две возможности: либо пользователи контролируют программу, либо программа контролирует пользователей».</span>
    </p>
</footer>

<script>
    async function publishThread() {
        const topicInput = document.getElementById('topic-input');
        const contentInput = document.getElementById('content-input');

        const topic = topicInput.value.trim();
        const content = contentInput.value.trim();

        
        const params = new URLSearchParams(window.location.search);
        const category = params.get('category');

        if (!topic || !content) {
            alert('Заполните название и текст темы!');
            return;
        }



        
        const payload = { topic, content };
        if (category) {
            payload.category = category; 
        }

        try {
            const response = await fetch('/threads', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                
                let redirectUrl = 'threads-page';
                if (category) {
                    redirectUrl += `?category=${encodeURIComponent(category)}`;
                }
                window.location.href = redirectUrl;
            } else {
                const errData = await response.json().catch(() => ({}));
                alert(`Ошибка: ${response.status} ${errData.message || ''}`);
            }
        } catch (error) {
            console.error(error);
            alert('Сервер недоступен. Проверьте консоль и server.js');
        }
    }

    async function loadRecentUsers() {
        try {
            const response = await fetch('/recent-users');
            const users = await response.json();
            const listContainer = document.getElementById('recent-users-list');
            listContainer.innerHTML = '';

            users.forEach(u => {
                const div = document.createElement('div');
                div.style.color = '#4CAF50';
                div.innerText = u.username;
                listContainer.appendChild(div);
            });
        } catch (err) {
            console.error("Ошибка загрузки юзеров:", err);
        }
    }
    window.onload = () => {
        loadRecentUsers()
    }

</script>

</body>
</html>
